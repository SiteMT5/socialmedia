<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Social Media 2026 - Maio</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: #16161a;
            --accent: #00f2ff; /* Ciano Neon para autoridade */
            --text: #ffffff;
            --text-muted: #a0a0ab;
            --not-started: #1a1a1a;
            --started: #facc15;
            --finished: #22c55e;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Urbanist', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; margin-bottom: 50px; max-width: 800px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(90deg, #00f2ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: var(--text-muted); font-size: 1.1rem; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            max-width: 1200px;
            width: 100%;
        }

        .weekday { text-align: center; color: var(--accent); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; padding-bottom: 15px; }

        .day-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            min-height: 150px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .day-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1); }

        .day-header { display: flex; justify-content: space-between; align-items: center; }
        .day-num { font-size: 1.4rem; font-weight: 700; color: var(--text-muted); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); }

        .day-topic { font-size: 0.9rem; font-weight: 600; line-height: 1.3; margin-top: 10px; color: #e4e4e7; }

        /* Modal / Sidebar de Roteiro */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            height: 100vh;
            margin-left: auto;
            padding: 40px;
            overflow-y: auto;
            border-left: 1px solid var(--accent);
            box-shadow: -20px 0 50px rgba(0,0,0,0.5);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .close-btn { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; color: var(--accent); cursor: pointer; background: none; border: none; }

        .modal-title { font-size: 2rem; color: var(--accent); margin-bottom: 10px; }
        .modal-subtitle { color: var(--text-muted); margin-bottom: 30px; font-weight: 400; }

        .status-picker { margin-bottom: 30px; background: #000; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .status-picker select { background: transparent; color: white; border: 1px solid var(--accent); padding: 10px; border-radius: 8px; width: 100%; font-size: 1rem; cursor: pointer; }

        .script-section { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 16px; margin-bottom: 25px; border-left: 4px solid var(--accent); }
        .script-section h3 { font-size: 1.2rem; color: var(--accent); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .slide-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1rem; line-height: 1.5; }
        .slide-item strong { color: var(--accent); }

        .video-box { white-space: pre-line; background: #000; padding: 20px; border-radius: 12px; color: #d1d5db; line-height: 1.8; font-style: italic; border: 1px dashed var(--accent); }

        .cta-container { display: flex; flex-direction: column; gap: 10px; }
        .cta-item { background: var(--accent); color: #000; padding: 12px 15px; border-radius: 8px; font-weight: 700; font-size: 0.95rem; }

        @media (max-width: 900px) {
            .calendar-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-content { max-width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Social Media Dashboard 2026</h1>
    <p>Maio: Cronograma de Autoridade e Vendas no TikTok</p>
</header>

<div class="calendar-grid" id="calendar">
    <div class="weekday">Dom</div><div class="weekday">Seg</div><div class="weekday">Ter</div>
    <div class="weekday">Qua</div><div class="weekday">Qui</div><div class="weekday">Sex</div><div class="weekday">Sáb</div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">✕ Fechar Painel</button>
        <h2 class="modal-title" id="mTitle">Tema do Dia</h2>
        <p class="modal-subtitle">Roteiro Completo para Carrossel e Vídeo Curto</p>

        <div class="status-picker">
            <label style="display:block; margin-bottom:10px; font-size:0.8rem; text-transform:uppercase; color:var(--accent);">Gerenciar Progresso:</label>
            <select id="statusSelect" onchange="updateStatus()">
                <option value="not-started">Não Iniciado (Preto)</option>
                <option value="started">Iniciado (Amarelo)</option>
                <option value="finished">Finalizado (Verde)</option>
            </select>
        </div>

        <div class="script-section">
            <h3>📸 Roteiro de Carrossel (7 Criativos)</h3>
            <div id="mCarousel"></div>
        </div>

        <div class="script-section">
            <h3>🎥 Roteiro de Vídeo (Máx 60s)</h3>
            <div class="video-box" id="mVideo"></div>
        </div>

        <div class="script-section">
            <h3>🎯 CTAs de Venda (Conversão no Direct)</h3>
            <div class="cta-container" id="mCta"></div>
        </div>
    </div>
</div>

<script>
    const temas = [
        "Por que seu TikTok parou de entregar?", "Como criei 30 dias de roteiros em 1h", "O segredo do carrossel que viraliza",
        "Social Media: O que eu faço de verdade", "3 Erros fatais na sua bio do TikTok", "Minha rotina de edição dinâmica",
        "Por que o direct é sua melhor ferramenta", "Respondendo a dúvida: 'Quanto custa?'", "Como delegar sua criação de conteúdo",
        "O poder de um bom roteiro de 60s", "Análise de um carrossel de sucesso", "Por que você precisa de um Social Media",
        "Gatilhos mentais que funcionam no TikTok", "Como atrair clientes com vídeos simples", "Minha ferramenta secreta de design",
        "A evolução do Social Media para 2026", "Checklist do post perfeito", "Venda sem parecer que está vendendo",
        "Como organizar seu Google Drive hoje", "O erro do iniciante no Social Media", "Design estratégico vs Design bonito",
        "Meu portfólio de edição de vídeo", "Storytelling para prestadores de serviço", "Respondendo críticas no direct",
        "O futuro dos vídeos curtos", "Como fechar seu primeiro contrato", "Bastidores: Editando um vídeo real",
        "A importância do acompanhamento", "Por que não faço gerenciamento completo", "O que postar quando não tem ideias", "Metas para Junho 2026"
    ];

    const dataBase = {};
    temas.forEach((tema, index) => {
        const dia = index + 1;
        dataBase[dia] = {
            title: tema,
            carousel: [
                "Slide 1 (Capa): " + tema + " (Frase de impacto + elemento visual)",
                "Slide 2: O problema: 'Você já sentiu que seu conteúdo não sai do lugar?'",
                "Slide 3: O contexto: Explique o porquê isso acontece em 2026.",
                "Slide 4: A solução 1: Explique como seu serviço de roteiro resolve isso.",
                "Slide 5: A solução 2: Mostre a importância da edição dinâmica.",
                "Slide 6: Benefício: O tempo que o cliente ganha delegando isso.",
                "Slide 7 (CTA): Gancho final: 'Não faça isso sozinho. Leia a legenda.'"
            ],
            video: "[00s-05s] GANCHO: Se você quer que o TikTok venda seu serviço em 2026, você precisa parar de cometer esse erro: " + tema.toLowerCase() + ".\n\n[05s-40s] DESENVOLVIMENTO: Muita gente foca em visualizações, mas como Social Media, eu foco em conversão. O segredo está no roteiro estratégico e numa edição que segura o olho do usuário até o final. Eu cuido de todo o seu calendário, roteiros e edição para você só se preocupar em atender o cliente.\n\n[40s-60s] CTA: Quer parar de perder tempo? Me manda um DIRECT agora!",
            ctas: [
                "Me mande um DIRECT com a palavra 'QUERO' para conversarmos.",
                "Cansado de postar e não vender? Me chama no Direct agora.",
                "Eu tenho 2 vagas abertas para este mês. Mande 'OI' no Direct."
            ]
        };
    });

    let currentDay = null;
    let savedStatus = JSON.parse(localStorage.getItem('sm_may_2026')) || {};

    function initCalendar() {
        const grid = document.getElementById('calendar');
        // Maio 2026 começa na Sexta (Dia da semana 5)
        for(let i=0; i<5; i++) grid.appendChild(document.createElement('div'));

        for(let d=1; d<=31; d++) {
            const card = document.createElement('div');
            card.className = 'day-card';
            const status = savedStatus[d] || 'not-started';
            
            card.innerHTML = `
                <div class="day-header">
                    <span class="day-num">${d}</span>
                    <div class="status-dot" id="dot-${d}" style="background:${getStatusColor(status)}"></div>
                </div>
                <div class="day-topic">${dataBase[d].title}</div>
            `;
            card.onclick = () => openDay(d);
            grid.appendChild(card);
        }
    }

    function getStatusColor(s) {
        if(s === 'started') return '#facc15';
        if(s === 'finished') return '#22c55e';
        return '#000000';
    }

    function openDay(d) {
        currentDay = d;
        const data = dataBase[d];
        document.getElementById('mTitle').innerText = `Dia ${d}: ${data.title}`;
        document.getElementById('mCarousel').innerHTML = data.carousel.map((s, i) => `<div class="slide-item"><strong>Slide ${i+1}:</strong> ${s}</div>`).join('');
        document.getElementById('mVideo').innerText = data.video;
        document.getElementById('mCta').innerHTML = data.ctas.map(c => `<div class="cta-item">${c}</div>`).join('');
        document.getElementById('statusSelect').value = savedStatus[d] || 'not-started';
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function updateStatus() {
        const val = document.getElementById('statusSelect').value;
        savedStatus[currentDay] = val;
        localStorage.setItem('sm_may_2026', JSON.stringify(savedStatus));
        document.getElementById(`dot-${currentDay}`).style.background = getStatusColor(val);
    }

    initCalendar();
</script>

</body>
</html>
